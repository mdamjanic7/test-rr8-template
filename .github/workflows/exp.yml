name: exp-exports
on: [push]
jobs:
  exp:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "lts/*"
      - run: npm ci
      - name: "BASELINE: deploy --force (dummy token) — expect exports error"
        continue-on-error: true
        env:
          SHOPIFY_HYDROGEN_DEPLOYMENT_TOKEN: dummy-build-repro-token
        run: |
          npx shopify hydrogen deploy --force > /tmp/baseline.log 2>&1 || true
          echo "---BASELINE exports-error count (expect >0)---"
          grep -c "is not defined by .exports." /tmp/baseline.log || true
          echo "---BASELINE tail---"; tail -20 /tmp/baseline.log
      - name: "PATCH @shopify/hydrogen exports to add ./package.json"
        run: |
          node -e "const fs=require('fs');const p='node_modules/@shopify/hydrogen/package.json';const j=JSON.parse(fs.readFileSync(p));j.exports['./package.json']='./package.json';fs.writeFileSync(p,JSON.stringify(j,null,2));console.log('patched')"
      - name: "AFTER PATCH: deploy --force (dummy token) — does exports error clear?"
        continue-on-error: true
        env:
          SHOPIFY_HYDROGEN_DEPLOYMENT_TOKEN: dummy-build-repro-token
        run: |
          npx shopify hydrogen deploy --force > /tmp/patched.log 2>&1 || true
          echo "---AFTER-PATCH exports-error count (want 0)---"
          grep -c "is not defined by .exports." /tmp/patched.log || true
          echo "---AFTER-PATCH tail (auth/upload error = past the build bug)---"; tail -25 /tmp/patched.log
