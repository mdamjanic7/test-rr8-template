name: exp-exports
on: [push]
jobs:
  exp:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "lts/*"
      - run: npm ci
      - name: "BASELINE: deploy (dummy token) — expect exports error"
        continue-on-error: true
        env:
          SHOPIFY_HYDROGEN_DEPLOYMENT_TOKEN: dummy-build-repro-token
        run: |
          set +e
          npx shopify hydrogen deploy 2>&1 | tee baseline.log
          echo "---BASELINE exports-error present?---"
          grep -c "is not defined by .exports." baseline.log || true
      - name: "PATCH @shopify/hydrogen exports to add ./package.json"
        run: |
          node -e "const fs=require('fs');const p='node_modules/@shopify/hydrogen/package.json';const j=JSON.parse(fs.readFileSync(p));j.exports['./package.json']='./package.json';fs.writeFileSync(p,JSON.stringify(j,null,2));console.log('patched exports:', JSON.stringify(j.exports['./package.json']))"
      - name: "AFTER PATCH: deploy (dummy token) — does exports error clear?"
        continue-on-error: true
        env:
          SHOPIFY_HYDROGEN_DEPLOYMENT_TOKEN: dummy-build-repro-token
        run: |
          set +e
          npx shopify hydrogen deploy 2>&1 | tee patched.log
          echo "---AFTER-PATCH exports-error present? (want 0)---"
          grep -c "is not defined by .exports." patched.log || true
          echo "---AFTER-PATCH how far did it get (auth/upload = past the bug)---"
          grep -iE "token|auth|unauthor|upload|deploy|invalid|build" patched.log | tail -8
